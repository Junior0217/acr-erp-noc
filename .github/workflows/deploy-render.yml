name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            --fail -o /dev/null -w "HTTP %{http_code}\n"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render frontend deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            --fail -o /dev/null -w "HTTP %{http_code}\n"

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success' && 'success' || 'failure' }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "good" || echo "danger")
          EMOJI=$([ "$STATUS" = "success" ] && echo ":white_check_mark:" || echo ":x:")
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$EMOJI *ACR ERP deploy* — \`${{ github.ref_name }}\` by \`${{ github.actor }}\`\\nBackend: ${{ needs.deploy-backend.result }} | Frontend: ${{ needs.deploy-frontend.result }}\"}]}"
